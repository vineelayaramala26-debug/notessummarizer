<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>AI Notes Summarizer</title>

    <style>
        body{
            margin:0;
            padding:0;
            background:#f4f7fb;
            font-family:Arial,Helvetica,sans-serif;
        }

        .container{
            width:70%;
            max-width:900px;
            margin:40px auto;
            background:white;
            padding:30px;
            border-radius:15px;
            box-shadow:0 5px 15px rgba(0,0,0,.2);
        }

        h1{
            text-align:center;
            color:#2c3e50;
        }

        textarea{
            width:100%;
            height:250px;
            padding:15px;
            font-size:16px;
            border-radius:10px;
            border:1px solid #ccc;
            resize:vertical;
            margin-top:20px;
            box-sizing:border-box;
        }

        input[type=file]{
            margin-top:20px;
            margin-bottom:20px;
        }

        button{
            background:#007bff;
            color:white;
            border:none;
            padding:12px 25px;
            font-size:16px;
            border-radius:8px;
            cursor:pointer;
            margin-top:10px;
        }

        button:hover{
            background:#0056b3;
        }

        .summary{
            margin-top:35px;
            background:#eef6ff;
            padding:20px;
            border-radius:10px;
            border-left:6px solid #007bff;
        }

        .summary h2{
            margin-top:0;
            color:#007bff;
        }

        .download{
            margin-top:20px;
        }

        .download button{
            background:#28a745;
        }

        .download button:hover{
            background:#1e7e34;
        }
    </style>

</head>
<body>

<div class="container">

    <h1>📚 AI Notes Summarizer</h1>

    <form method="POST" enctype="multipart/form-data">

        <label><b>Paste your notes</b></label>

        <textarea
            name="text"
            placeholder="Paste your notes here..."></textarea>

        <br>

        <label><b>OR Upload PDF</b></label>

        <br>

        <input type="file" name="pdf" accept=".pdf">

        <br>

        <button type="submit">
            Generate Summary
        </button>

    </form>

    {% if summary %}

    <div class="summary">

        <h2>Summary</h2>

        <p>{{ summary }}</p>

        <div class="download">
            <a href="/download">
                <button>
                    📄 Download Summary as PDF
                </button>
            </a>
        </div>

    </div>

    {% endif %}

</div>

</body>
</html>
